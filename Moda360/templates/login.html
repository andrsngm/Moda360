<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Login | MODA 360</title>
				<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
					<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
						<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
							<style>
								:root {
								--primary-dark: #1a1a1a;
								--accent-color: #00e676;
								--glass-bg: rgba(255, 255, 255, 0.95);
								}

								body {
								font-family: 'Montserrat', sans-serif;
								margin: 0;
								padding: 0;
								display: flex;
								align-items: center;
								justify-content: center;
								min-height: 100vh;
								background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
								url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070&auto=format&fit=crop');
								background-size: cover;
								background-position: center;
								background-attachment: fixed;
								}

								.container-main {
								width: 100%;
								max-width: 420px;
								padding: 20px;
								animation: fadeIn 0.8s ease-out;
								}

								@keyframes fadeIn {
								from { opacity: 0; transform: translateY(20px); }
								to { opacity: 1; transform: translateY(0); }
								}

								.card {
								border: none !important;
								border-radius: 35px !important;
								background: var(--glass-bg) !important;
								box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5) !important;
								overflow: hidden;
								backdrop-filter: blur(10px);
								}

								.header-login {
								background-color: var(--primary-dark) !important;
								padding: 3rem 1.5rem 2rem;
								text-align: center;
								color: #ffffff !important;
								position: relative;
								}

								.header-login::after {
								content: '';
								position: absolute;
								bottom: 0;
								left: 50%;
								transform: translateX(-50%);
								width: 50px;
								height: 4px;
								background-color: var(--accent-color);
								border-radius: 2px;
								}

								.card-body {
								padding: 2.5rem !important;
								}

								.form-label {
								font-size: 0.75rem;
								font-weight: 700;
								text-transform: uppercase;
								color: #475569;
								margin-bottom: 0.6rem;
								letter-spacing: 1px;
								}

								.input-group {
								background-color: #f8fafc;
								border-radius: 15px;
								transition: 0.3s;
								border: 1px solid #e2e8f0;
								}

								.input-group:focus-within {
								border-color: var(--primary-dark);
								box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
								}

								.input-group-text {
								border: none !important;
								background: transparent !important;
								color: #94a3b8;
								padding-left: 1.25rem;
								}

								.form-control {
								border: none !important;
								background: transparent !important;
								padding: 0.9rem 1rem;
								font-size: 0.95rem;
								color: var(--primary-dark);
								font-weight: 500;
								}

								.form-control:focus {
								box-shadow: none !important;
								}

								.btn-entrar {
								border-radius: 18px !important;
								padding: 1rem !important;
								background-color: var(--primary-dark) !important;
								color: white !important;
								border: none !important;
								text-transform: uppercase;
								letter-spacing: 3px;
								font-weight: 700;
								font-size: 0.9rem;
								margin-top: 1.5rem;
								transition: all 0.4s ease;
								display: flex;
								align-items: center;
								justify-content: center;
								gap: 10px;
								}

								.btn-entrar:hover {
								background-color: #000 !important;
								transform: scale(1.02);
								box-shadow: 0 10px 20px rgba(0,0,0,0.2);
								}

								.register-link {
								font-size: 0.85rem;
								margin-top: 2rem;
								padding-top: 1.5rem;
								border-top: 1px solid #e2e8f0;
								}

								/* Estilo refinado para el logo de moda */
								.brand-logo {
								width: 70px;
								height: 70px;
								background: #fff;
								border-radius: 50%;
								display: flex;
								align-items: center;
								justify-content: center;
								margin: 0 auto 1.5rem;
								box-shadow: 0 8px 15px rgba(0,0,0,0.2);
								border: 2px solid var(--accent-color);
								}

								.brand-logo i {
								font-size: 2rem;
								color: var(--primary-dark);
								}
							</style>
						</head>
	<body>
		<div class="container-main">
			<div class="card">
				<div class="header-login">
					<div class="brand-logo">
						<i class="bi bi-person-workspace"></i>
					</div>
					<h2 class="fw-bold text-uppercase mb-0" style="letter-spacing: 4px; font-size: 1.4rem;">MODA 360</h2>
					<p class="small opacity-75 mt-2 fw-light">Accede a tu cuenta exclusiva</p>
				</div>
				<div class="card-body">
					{% with messages = get_flashed_messages(with_categories=true) %}
					{% if messages %}
					{% for category, message in messages %}
					<div class="alert alert-danger border-0 small fw-bold py-3 mb-4 text-center" style="border-radius: 15px;">
						<i class="bi bi-shield-exclamation me-2"></i> {{ message }}
					</div>
					{% endfor %}
					{% endif %}
					{% endwith %}
					<form action="{{ url_for('login') }}" method="POST">
						<div class="mb-4">
							<label class="form-label">Teléfono</label>
							<div class="input-group">
								<span class="input-group-text">
									<i class="bi bi-phone"></i>
								</span>
								<input type="text" name="telefono" id="telefono_input"
										class="form-control"
										placeholder="0412-1234567"
										maxlength="12"
										required="">
								</div>
						</div>
						<div class="mb-4">
							<label class="form-label">Contraseña</label>
							<div class="input-group">
								<span class="input-group-text">
									<i class="bi bi-lock"></i>
								</span>
								<input type="password" name="password"
										class="form-control"
										placeholder="••••••••"
										required="">
								</div>
						</div>
						<button type="submit" class="btn btn-dark w-100 btn-entrar">
							Iniciar Sesión <i class="bi bi-chevron-right fs-5"></i>
						</button>
					</form>
					<div class="text-center register-link">
						<p class="text-muted mb-0">
							¿No eres miembro aún? <br>
								<a href="{{ url_for('registro') }}" class="text-dark fw-bold text-decoration-none d-inline-block mt-2" style="border-bottom: 2px solid var(--accent-color);">
									Crea una cuenta gratis
								</a>
							</p>
					</div>
				</div>
			</div>
		</div>
		<script>
			// Lógica para agregar el guion automáticamente después de 4 dígitos
			const telefonoInput = document.getElementById('telefono_input');

			telefonoInput.addEventListener('input', function (e) {
			let value = e.target.value.replace(/\D/g, '');
			if (value.length > 4) {
			value = value.slice(0, 4) + '-' + value.slice(4, 11);
			}
			e.target.value = value;
			});
		</script>
	</body>
</html>
