<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Registro | MODA 360</title>

				<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
					<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
						<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

							<style>
								:root {
								--primary-dark: #1a1a1a;
								--accent-color: #00e676;
								--glass-bg: rgba(255, 255, 255, 0.95);
								}

								body {
								font-family: 'Montserrat', sans-serif;
								margin: 0;
								padding: 0;
								display: flex;
								align-items: center;
								justify-content: center;
								min-height: 100vh;
								/* Fondo de ropa con overlay igual al login */
								background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
								url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070&auto=format&fit=crop');
								background-size: cover;
								background-position: center;
								background-attachment: fixed;
								}

								.container-main {
								width: 100%;
								max-width: 450px;
								padding: 20px;
								animation: fadeIn 0.8s ease-out;
								}

								@keyframes fadeIn {
								from { opacity: 0; transform: translateY(20px); }
								to { opacity: 1; transform: translateY(0); }
								}

								.card {
								border: none !important;
								border-radius: 35px !important;
								background: var(--glass-bg) !important;
								box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5) !important;
								overflow: hidden;
								backdrop-filter: blur(10px);
								}

								.header-registro {
								background-color: var(--primary-dark) !important;
								padding: 2.5rem 1.5rem 1.5rem;
								text-align: center;
								color: #ffffff !important;
								position: relative;
								}

								.header-registro::after {
								content: '';
								position: absolute;
								bottom: 0;
								left: 50%;
								transform: translateX(-50%);
								width: 50px;
								height: 4px;
								background-color: var(--accent-color);
								border-radius: 2px;
								}

								.brand-logo {
								width: 60px;
								height: 60px;
								background: #fff;
								border-radius: 50%;
								display: flex;
								align-items: center;
								justify-content: center;
								margin: 0 auto 1rem;
								box-shadow: 0 8px 15px rgba(0,0,0,0.2);
								border: 2px solid var(--accent-color);
								}

								.brand-logo i {
								font-size: 1.8rem;
								color: var(--primary-dark);
								}

								.card-body {
								padding: 2rem 2.5rem !important;
								}

								.field-container {
								position: relative;
								margin-bottom: 1.2rem;
								}

								.form-label {
								font-size: 0.7rem;
								font-weight: 700;
								text-transform: uppercase;
								color: #475569;
								margin-bottom: 0.4rem;
								letter-spacing: 1px;
								display: block;
								}

								input {
								display: block;
								width: 100%;
								padding: 0.8rem 1.2rem;
								border-radius: 15px !important;
								border: 1px solid #e2e8f0 !important;
								background-color: #f8fafc !important;
								transition: all 0.3s ease;
								font-size: 0.9rem;
								color: var(--primary-dark);
								}

								input:focus {
								border-color: var(--primary-dark) !important;
								background-color: #ffffff !important;
								outline: 0;
								box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
								}

								.feedback-js {
								font-size: 0.65rem;
								margin-top: 4px;
								font-weight: 700;
								min-height: 1rem;
								padding-left: 5px;
								}

								.btn-registro {
								border-radius: 18px !important;
								padding: 1rem !important;
								background-color: var(--primary-dark) !important;
								color: white !important;
								border: none !important;
								text-transform: uppercase;
								letter-spacing: 2px;
								font-weight: 700;
								font-size: 0.85rem;
								margin-top: 1rem;
								transition: all 0.4s ease;
								display: flex;
								align-items: center;
								justify-content: center;
								gap: 10px;
								}

								.btn-registro:hover:not(:disabled) {
								background-color: #000 !important;
								transform: scale(1.02);
								box-shadow: 0 10px 20px rgba(0,0,0,0.2);
								}

								.login-link {
								font-size: 0.85rem;
								margin-top: 1.5rem;
								padding-top: 1rem;
								border-top: 1px solid #e2e8f0;
								}

								@media (max-width: 480px) {
								.card-body { padding: 1.5rem !important; }
								.header-registro { padding: 2rem 1rem; }
								}
							</style>
						</head>
	<body>

		<div class="container-main">
			<div class="card">
				<div class="header-registro">
					<div class="brand-logo">
						<i class="bi bi-person-workspace"></i>
					</div>
					<h2 class="fw-bold text-uppercase mb-0" style="letter-spacing: 3px; font-size: 1.2rem;">Seguridad Moda 360</h2>
					<p class="small opacity-75 mt-1 fw-light">Crea tu acceso exclusivo</p>
				</div>

				<div class="card-body">
					{% with messages = get_flashed_messages(with_categories=true) %}
					{% if messages %}
					{% for category, message in messages %}
					<div class="alert alert-{{ category }} border-0 small py-2 mb-3 fw-bold text-center" style="border-radius: 12px; font-size: 0.75rem;">
						{{ message }}
					</div>
					{% endfor %}
					{% endif %}
					{% endwith %}

					<form action="{{ url_for('registro') }}" method="POST" id="registroForm" novalidate="">

						<div class="field-container">
							<label class="form-label">Nombre</label>
							<input type="text" name="nombre" id="nombre" placeholder="Ej: Juan" required="">
                </div>

						<div class="field-container">
							<label class="form-label">Apellido</label>
							<input type="text" name="apellido" id="apellido" placeholder="Ej: Pérez" required="">
                </div>

						<div class="field-container">
							<label class="form-label">Teléfono (Tu Usuario)</label>
							<input type="text" name="telefono" id="telefono" placeholder="0412-0000000" maxlength="12" required="">
                </div>

						<div class="field-container">
							<label class="form-label">Correo Electrónico</label>
							<input type="email" name="email" id="email" placeholder="usuario@moda360.com" required="">
                </div>

						<div class="field-container">
							<label class="form-label">Contraseña</label>
							<input type="password" name="password" id="pass1" placeholder="Mínimo 5 caracteres" required="">
                </div>

						<div class="field-container">
							<label class="form-label">Confirmar Contraseña</label>
							<input type="password" id="pass2" placeholder="Repite tu clave" required="">
                </div>

						<button type="submit" id="btnSubmit" class="btn btn-dark w-100 btn-registro" disabled="" style="opacity: 0.5;">
							Registrar Cuenta <i class="bi bi-chevron-right"></i>
						</button>
					</form>

					<div class="text-center login-link">
						<p class="small text-muted mb-0">
							¿Ya tienes cuenta?
							<a href="{{ url_for('login') }}" class="text-dark fw-bold text-decoration-none" style="border-bottom: 2px solid var(--accent-color);">
								Inicia sesión aquí
							</a>
						</p>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function() {
			const inputs = {
			tel: document.getElementById('telefono'),
			nom: document.getElementById('nombre'),
			ape: document.getElementById('apellido'),
			email: document.getElementById('email'),
			p1: document.getElementById('pass1'),
			p2: document.getElementById('pass2')
			};
			const btnSubmit = document.getElementById('btnSubmit');

			function mostrarError(input, mensaje, esError) {
			if (!input) return;
			const container = input.closest('.field-container');
			let errorDiv = container.querySelector('.feedback-js');
			if (!errorDiv) {
			errorDiv = document.createElement('div');
			errorDiv.className = 'feedback-js';
			container.appendChild(errorDiv);
			}

			if (mensaje === "") {
			errorDiv.innerHTML = "";
			input.style.borderColor = "#e2e8f0";
			} else {
			errorDiv.innerHTML = esError ? `✕ ${mensaje}` : `✓ ${mensaje}`;
			errorDiv.style.color = esError ? "#dc3545" : "#198754";
			input.style.borderColor = esError ? "#dc3545" : "#198754";
			}
			validarTodo();
			}

			inputs.tel.addEventListener('input', function() {
			let num = this.value.replace(/\D/g, '').slice(0, 11);
			this.value = num.length > 4 ? num.slice(0, 4) + '-' + num.slice(4, 11) : num;
			mostrarError(this, num.length === 11 ? "Válido" : "Faltan dígitos", num.length !== 11);
			});

			[inputs.nom, inputs.ape].forEach(input => {
			input.addEventListener('input', function() {
			this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '');
			mostrarError(this, this.value.trim().length < 3 ? "Muy corto" : "Válido", this.value.trim().length < 3);
        });
    });

    inputs.email.addEventListener('blur', function() {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        mostrarError(this, regex.test(this.value) ? "Válido" : "Formato inválido", !regex.test(this.value));
    });

    function validarPass() {
        const p1 = inputs.p1.value;
        const p2 = inputs.p2.value;
        const seguro = p1.length >= 5 && /[a-zA-Z]/.test(p1) && /\d/.test(p1);
			mostrarError(inputs.p1, seguro ? "Válido" : "Letras y números (min 5)", !seguro);
			if (p2) mostrarError(inputs.p2, (p1 === p2 && p2 !== "") ? "Coinciden" : "No coinciden", p1 !== p2);
			}
			inputs.p1.addEventListener('input', validarPass);
			inputs.p2.addEventListener('input', validarPass);

			function validarTodo() {
			const feedbacks = Array.from(document.querySelectorAll('.feedback-js'));
			const hayErrores = feedbacks.some(f => f.textContent.includes('✕'));
			const todosVálidos = feedbacks.length >= 5 && feedbacks.every(f => f.textContent.includes('✓'));

			const llenos = inputs.nom.value && inputs.ape.value && inputs.tel.value.length >= 12 && inputs.p1.value === inputs.p2.value && inputs.p1.value !== "";

			btnSubmit.disabled = !todosVálidos || !llenos;
			btnSubmit.style.opacity = btnSubmit.disabled ? "0.5" : "1";
			btnSubmit.style.cursor = btnSubmit.disabled ? "not-allowed" : "pointer";
			}
			});
		</script>
	</body>
</html>
